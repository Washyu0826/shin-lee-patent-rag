services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    ports: ["6333:6333"]
    volumes: ["./volumes/qdrant:/qdrant/storage"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    ports: ["11434:11434"]
    volumes: ["./volumes/ollama:/root/.ollama"]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: patent_rag
      POSTGRES_USER: patent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patent2026}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patent -d patent_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: patent-rag-api:latest
    ports: ["8000:8000"]
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      DATABASE_URL: postgresql://patent:${POSTGRES_PASSWORD:-patent2026}@postgres:5432/patent_rag
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b-instruct}
      EMBED_MODEL: ${EMBED_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      ENABLE_RERANK: "true"
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-patent2026}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-v3}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      PATENT_LIST_LIMIT: ${PATENT_LIST_LIMIT:-1000}
      COMPARE_SCROLL_LIMIT: ${COMPARE_SCROLL_LIMIT:-300}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    volumes:
      - ./data:/app/data
      - ./volumes/models:/models
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/strict"]
      interval: 30s
      timeout: 5s
      retries: 5
